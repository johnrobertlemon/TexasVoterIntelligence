<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Voter Intelligence | Precinct-Level Ballot Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-3 shadow-sm">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fs-5 font-weight-bold" href="#">
                Texas Voter Intelligence
            </a>
            <span class="navbar-text text-uppercase small tracking-widest text-secondary">
                Non-Partisan Election Data
            </span>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="text-center mb-5">
                    <h1 class="display-5 fw-bold">Your Sample Ballot</h1>
                    <p class="lead text-muted">Precinct-level information for Williamson County.</p>
                    <hr class="w-25 mx-auto">
                </div>

                <div id="ballot-container">
                    <div class="text-center p-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading Ballot Data...</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="footer mt-auto py-4 bg-white border-top">
        <div class="container text-center">
            <span class="text-muted small">© 2026 Texas Voter Intelligence Project. Data sourced from Williamson County Elections.</span>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
